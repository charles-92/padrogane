<script>
window.addEventListener('DOMContentLoaded', () => {

  // Function to speak any text with a female voice
  function speak(text){
    if('speechSynthesis' in window){
      let voices = window.speechSynthesis.getVoices();
      // Try to select a female voice
      let femaleVoice = voices.find(v => 
        v.name.toLowerCase().includes('zira') || 
        v.name.toLowerCase().includes('susan') || 
        v.name.toLowerCase().includes('female')
      ) || voices[0]; // fallback if not found

      const msg = new SpeechSynthesisUtterance(text);
      msg.voice = femaleVoice;
      msg.lang = 'en-US';
      msg.rate = 1;    // normal speed
      msg.pitch = 1.2; // slightly higher pitch for female tone
      window.speechSynthesis.speak(msg);
    }
  }

  // Speak welcome message on page load
  function speakWelcome(){
    speak("This is a image and Video tips for disaster");
  }

  // Some browsers load voices asynchronously
  if (speechSynthesis.getVoices().length === 0){
    window.speechSynthesis.onvoiceschanged = speakWelcome;
  } else {
    speakWelcome();
  }

  // Add click feedback for nav buttons
  const navButtons = document.querySelectorAll('nav a');
  navButtons.forEach(button => {
    button.addEventListener('click', () => {
      speak("You clicked " + button.textContent);
    });
  });

});
</script>
